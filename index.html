<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>PawRace 3D</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0; padding: 0; overflow: hidden;
            width: 100%; height: 100%;
            background-color: #87CEEB;
            font-family: Arial, sans-serif;
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* UI表示 */
        #ui-container {
            position: absolute; top: 20px; left: 20px;
            color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-weight: bold; pointer-events: none; z-index: 10;
        }
        #speed-val { font-size: 24px; color: #FFD700; }

        /* スマホ用ボタン */
        .touch-btn {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            color: white; font-size: 28px; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            width: 80px; height: 80px;
            z-index: 20;
            touch-action: none;
        }
        .touch-btn:active { background: rgba(255, 255, 255, 0.7); color: #333; }
        #btn-left { bottom: 40px; left: 30px; }
        #btn-right { bottom: 40px; left: 130px; }
        #btn-accel { bottom: 40px; right: 40px; width: 90px; height: 90px; background: rgba(0, 200, 0, 0.4); border-color: rgba(0, 255, 0, 0.7); }

        /* ローディング画面 */
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #222; color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 999;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #555; border-top: 5px solid #1CAAD9;
            border-radius: 50%; animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="loading-text" style="font-size: 18px;">ビークルを整備中...</div>
    </div>

    <div id="ui-container">
        <div>SPEED: <span id="speed-val">0</span> km/h</div>
    </div>

    <div class="touch-btn" id="btn-left">←</div>
    <div class="touch-btn" id="btn-right">→</div>
    <div class="touch-btn" id="btn-accel">GO</div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.005);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(100, 200, 50);
        scene.add(dirLight);

        // 地面
        const trackGeometry = new THREE.PlaneGeometry(500, 500);
        const trackMaterial = new THREE.MeshLambertMaterial({ color: 0x444444 });
        const track = new THREE.Mesh(trackGeometry, trackMaterial);
        track.rotation.x = -Math.PI / 2;
        scene.add(track);

        const gridHelper = new THREE.GridHelper(500, 100, 0x222222, 0x666666);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // 操作の管理
        const controls = { forward: false, left: false, right: false };

        // PCキーボード
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') controls.forward = true;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') controls.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') controls.right = true;
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') controls.forward = false;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') controls.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') controls.right = false;
        });

        // スマホタッチ
        function setupTouch(id, prop) {
            const el = document.getElementById(id);
            if(el) {
                el.addEventListener('touchstart', (e) => { e.preventDefault(); controls[prop] = true; }, {passive: false});
                el.addEventListener('touchend', (e) => { e.preventDefault(); controls[prop] = false; }, {passive: false});
            }
        }
        setupTouch('btn-left', 'left');
        setupTouch('btn-right', 'right');
        setupTouch('btn-accel', 'forward');

        const loadingText = document.getElementById('loading-text');
